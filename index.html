<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBP 2 DOC</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
    </style>
</head>
<body>
    <h1>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        EmpirBus to IO list
    </h1>

    <div class="drop-zone" id="dropZone">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" style="margin: 0 auto 10px; display: block;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <p><strong>Drop .ebp file here or click to browse</strong></p>
        <p style="font-size: 14px; color: #999;">Supports EmpirBus Project (.ebp) files</p>
        <input type="file" id="fileInput" accept=".ebp">
    </div>

    <!-- Toolbar (hidden until file is loaded) -->
    <div class="toolbar" id="toolbar">
        <input type="text"
               class="search-box"
               id="searchBox"
               placeholder="🔍 Search units or channels...">
        <button class="button button-secondary" id="exportPDF">
            📄 Export PDF
        </button>
    </div>

    <!-- Tabs (hidden until file is loaded) -->
    <div class="tabs hidden" id="tabs">
        <button class="tab-button active" data-tab="units">Units</button>
        <button class="tab-button" data-tab="components">NMEA Components</button>
        <button class="tab-button" data-tab="alerts">Alerts</button>
        <button class="tab-button" data-tab="memory">Memory</button>
        <button class="tab-button" data-tab="modules">Modules</button>
    </div>

    <!-- Results container -->
    <div class="results" id="results"></div>

    <!-- Print-only channel table (hidden on screen, shown via @media print) -->
    <div id="printTable" class="print-only"></div>

    <!-- Export details modal (boat info + per-module location) -->
    <div class="modal-overlay hidden" id="exportModalOverlay">
        <div class="modal">
            <h3>Export details</h3>
            <div class="modal-field">
                <label for="boatName">Boat name</label>
                <input type="text" id="boatName" placeholder="e.g. Serenity">
            </div>
            <div class="modal-field">
                <label for="boatType">Boat type</label>
                <input type="text" id="boatType" placeholder="e.g. Sunseeker 65">
            </div>
            <div class="modal-field">
                <label for="boatLogo">Logo (optional, cover page only)</label>
                <input type="file" id="boatLogo" accept="image/*">
                <img id="boatLogoPreview" class="modal-logo-preview hidden" alt="Logo preview">
            </div>
            <div class="modal-field">
                <label>Accent color</label>
                <div class="modal-color-list" id="modalColorList">
                    <button type="button" class="modal-color-swatch selected" data-color="#2563eb" style="background:#2563eb" title="Blue" aria-label="Blue"></button>
                    <button type="button" class="modal-color-swatch" data-color="#540F0B" style="background:#540F0B" title="Red (Burgundy)" aria-label="Red (Burgundy)"></button>
                    <button type="button" class="modal-color-swatch" data-color="#db6d28" style="background:#db6d28" title="Orange" aria-label="Orange"></button>
                    <button type="button" class="modal-color-swatch" data-color="#3fb950" style="background:#3fb950" title="Green" aria-label="Green"></button>
                </div>
            </div>
            <div class="modal-field">
                <label>Module locations</label>
                <div class="modal-unit-list" id="modalUnitList"></div>
            </div>
            <div class="modal-actions">
                <button class="button button-secondary" id="exportModalCancel">Cancel</button>
                <button class="button button-primary" id="exportModalConfirm">Generate PDF</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span class="footer-version">v1.2.0</span>
        <span class="footer-separator">•</span>
        <a href="https://github.com/remcohalman/ebp2docs" target="_blank" class="footer-link">
            View on GitHub
        </a>
    </div>

    <!-- Import modules -->
    <script type="module">
        import { parseUnits, parseProjectMetadata, parseAlarms, parseComponents, parseMemory, validateEBP } from './js/parser.js';
        import { displayUnits, displayComponents, displayAlertsDetailed, displayMemory, displayModules, displayError, getVisibleChannelGroups } from './js/ui.js';
        import { downloadPDF, filterUnitsAndChannels, debounce, escapeHtml } from './js/utils.js';
        import { MODULES, getModuleByProductNumber } from './modules.js';

        // DOM elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const results = document.getElementById('results');
        const toolbar = document.getElementById('toolbar');
        const searchBox = document.getElementById('searchBox');
        const exportPDFBtn = document.getElementById('exportPDF');
        const tabs = document.getElementById('tabs');
        const metadataCard = document.querySelector('.metadata-card');
        const exportModalOverlay = document.getElementById('exportModalOverlay');
        const modalUnitList = document.getElementById('modalUnitList');
        const boatNameInput = document.getElementById('boatName');
        const boatTypeInput = document.getElementById('boatType');
        const boatLogoInput = document.getElementById('boatLogo');
        const boatLogoPreview = document.getElementById('boatLogoPreview');
        const modalColorList = document.getElementById('modalColorList');
        const exportModalCancel = document.getElementById('exportModalCancel');
        const exportModalConfirm = document.getElementById('exportModalConfirm');

        let selectedAccentColor = modalColorList.querySelector('.modal-color-swatch.selected').dataset.color;
        // Logo is held in memory only for this export - never persisted to disk/storage.
        let logoDataUrl = '';

        boatLogoInput.addEventListener('change', () => {
            const file = boatLogoInput.files[0];
            if (!file) {
                logoDataUrl = '';
                boatLogoPreview.classList.add('hidden');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                logoDataUrl = e.target.result;
                boatLogoPreview.src = logoDataUrl;
                boatLogoPreview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        modalColorList.addEventListener('click', (e) => {
            const swatch = e.target.closest('.modal-color-swatch');
            if (!swatch) return;
            modalColorList.querySelectorAll('.modal-color-swatch').forEach(el => el.classList.remove('selected'));
            swatch.classList.add('selected');
            selectedAccentColor = swatch.dataset.color;
        });

        // Store parsed data globally
        let currentUnits = [];
        let allUnits = [];
        let currentMetadata = null;
        let currentAlarms = [];
        let currentComponents = [];
        let currentMemory = [];
        let activeTab = 'units';

        // Click to upload
        dropZone.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        // Handle file upload
        async function handleFile(file) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const content = e.target.result;

                    // Validate first
                    const validation = validateEBP(content);
                    if (!validation.isValid) {
                        displayError(`Invalid EBP file: ${validation.errors.join(', ')}`, results);
                        return;
                    }

                    // Parse all data
                    allUnits = await parseUnits(content);

                    // Enrich units with product numbers from modules.js
                    const moduleLookup = new Map();
                    MODULES.forEach(module => {
                        moduleLookup.set(module.standardUnitVariantNumber, module);
                    });

                    allUnits = allUnits.map(unit => {
                        const moduleInfo = moduleLookup.get(unit.standardUnitVariantNumber);
                        return {
                            ...unit,
                            productNumber: moduleInfo ? moduleInfo.productNumber : 'Unknown'
                        };
                    });

                    currentUnits = allUnits;
                    currentMetadata = parseProjectMetadata(content);
                    currentAlarms = parseAlarms(content);
                    currentComponents = await parseComponents(content);
                    currentMemory = parseMemory(content);

                    // Display current tab
                    displayCurrentTab();

                    // Show toolbar and tabs
                    toolbar.style.display = 'flex';
                    tabs.classList.remove('hidden');

                    // Reset search box
                    searchBox.value = '';

                } catch (error) {
                    displayError(error.message, results);
                }
            };
            reader.readAsText(file);
        }

        // Display current tab
        function displayCurrentTab() {
            switch (activeTab) {
                case 'units':
                    displayUnits(currentUnits, results, currentMetadata, false, currentAlarms);
                    break;
                case 'components':
                    displayComponents(currentComponents, results, currentMetadata);
                    break;
                case 'alerts':
                    displayAlertsDetailed(currentAlarms, results, currentMetadata);
                    break;
                case 'memory':
                    displayMemory(currentMemory, results, currentMetadata);
                    break;
                case 'modules':
                    displayModules(allUnits, results, currentMetadata, MODULES);
                    break;
            }
        }

        // Tab switching
        tabs.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', () => {
                // Update active tab
                activeTab = button.dataset.tab;

                // Update button states
                tabs.querySelectorAll('.tab-button').forEach(btn => {
                    btn.classList.remove('active');
                });
                button.classList.add('active');

                // Display current tab
                displayCurrentTab();

                // Hide search for non-units tabs
                if (activeTab !== 'units') {
                    searchBox.style.display = 'none';
                } else {
                    searchBox.style.display = 'block';
                }

                // Show metadata card only for units tab
                const metadataCard = document.querySelector('.metadata-card');
                if (metadataCard) {
                    if (activeTab === 'units') {
                        metadataCard.style.display = 'block';
                    } else {
                        metadataCard.style.display = 'none';
                    }
                }
            });
        });

        // Search functionality (only for units tab)
        searchBox.addEventListener('input', debounce((e) => {
            if (activeTab === 'units') {
                const searchTerm = e.target.value;
                const { units: filtered, hasSearch } = filterUnitsAndChannels(allUnits, searchTerm);
                currentUnits = filtered;
                displayUnits(currentUnits, results, currentMetadata, hasSearch, currentAlarms);
            }
        }, 300));

        // Export PDF - open the details modal first (boat info + per-module location)
        exportPDFBtn.addEventListener('click', () => {
            openExportModal();
        });

        function openExportModal() {
            // Only list units that will actually appear in the printed output
            // (excludes WDU/MFD units and units with no visible channels).
            const printableUnits = allUnits.filter(unit => {
                if (unit.unitTypeId === '200') return false;
                const groups = getVisibleChannelGroups(unit.channels, unit.unitTypeId);
                return groups.some(group => group.channels.length > 0);
            });

            modalUnitList.innerHTML = printableUnits.map(unit => `
                <div class="modal-unit-row" data-unit-id="${escapeHtml(unit.id)}">
                    <span class="modal-unit-name">${escapeHtml(unit.name)} (Unit ID: ${escapeHtml(unit.id)})</span>
                    <input type="text" class="modal-location-input" placeholder="Location">
                </div>
            `).join('');

            exportModalOverlay.classList.remove('hidden');
        }

        function closeExportModal() {
            exportModalOverlay.classList.add('hidden');
        }

        function resetLogoInput() {
            boatLogoInput.value = '';
            logoDataUrl = '';
            boatLogoPreview.src = '';
            boatLogoPreview.classList.add('hidden');
        }

        exportModalCancel.addEventListener('click', () => {
            closeExportModal();
            resetLogoInput();
        });

        exportModalOverlay.addEventListener('click', (e) => {
            if (e.target === exportModalOverlay) {
                closeExportModal();
                resetLogoInput();
            }
        });

        exportModalConfirm.addEventListener('click', () => {
            const boatName = boatNameInput.value.trim();
            const boatType = boatTypeInput.value.trim();

            const locationsByUnitId = {};
            modalUnitList.querySelectorAll('.modal-unit-row').forEach(row => {
                const unitId = row.dataset.unitId;
                const location = row.querySelector('.modal-location-input').value.trim();
                locationsByUnitId[unitId] = location;
            });

            const logoForExport = logoDataUrl;

            closeExportModal();
            resetLogoInput();
            downloadPDF(allUnits, currentMetadata, { boatName, boatType, locationsByUnitId, accentColor: selectedAccentColor, logoDataUrl: logoForExport });
        });
    </script>
</body>
</html>
